app = "sensecv-api"
primary_region = "gru"

[build]
  dockerfile = "deploy/Dockerfile"

[env]
  PORT = "8080"
  PYTHONPATH = "/app/src"
  SENSECV_DATA_DIR = "/data"
  SENSECV_EXTRA_CLIP_ROOTS = "/data/clips"
  SENSECV_EXPORTS_DIR = "/data/exports"
  SENSECV_HISTORY_FILE = "/data/history.json"
  SENSECV_UPLOADS_DIR = "/data/clips"

[mounts]
  source = "sensecv_data"
  destination = "/data"
  initial_size = "20gb"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  memory_mb = 1024
  cpu_kind = "shared"
  cpus = 1